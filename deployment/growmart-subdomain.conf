# GrowMart Subdomain Configuration
# growmart.mygrownet.com - E-commerce marketplace on MyGrowNet platform

# HTTP to HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name growmart.mygrownet.com;
    
    return 301 https://growmart.mygrownet.com$request_uri;
}

# HTTPS server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name growmart.mygrownet.com;
    
    root /var/www/mygrownet.com/public;
    index index.php index.html;
    
    # SSL Configuration (Wildcard certificate)
    ssl_certificate /etc/letsencrypt/live/mygrownet.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mygrownet.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
    
    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    
    # File upload size for product images
    client_max_body_size 50M;
    client_body_buffer_size 128k;
    
    # Timeouts for large uploads
    client_body_timeout 60s;
    client_header_timeout 60s;
    
    charset utf-8;
    
    # Access and error logs
    access_log /var/log/nginx/growmart-access.log;
    error_log /var/log/nginx/growmart-error.log;
    
    # No rewrite rules — domain-specific routes handle subdomain routing natively
    location / {
        try_files $uri $uri/ @laravel;
    }
    
    # PHP-FPM passthrough (preserves original REQUEST_URI for Laravel routing)
    location @laravel {
        fastcgi_pass unix:/var/run/php/php8.3-fpm.sock;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root/index.php;
        fastcgi_param REQUEST_URI $uri$is_args$args;
    }
    
    # Favicon and robots
    location = /favicon.ico { 
        access_log off; 
        log_not_found off; 
    }
    
    location = /robots.txt  { 
        access_log off; 
        log_not_found off; 
    }
    
    # Handle 404 errors
    error_page 404 /index.php;
    
    # PHP-FPM processing
    location ~ \.php$ {
        fastcgi_pass unix:/var/run/php/php8.3-fpm.sock;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        
        # Timeouts for PHP processing
        fastcgi_read_timeout 300;
        fastcgi_send_timeout 300;
        
        # Buffer settings
        fastcgi_buffers 16 16k;
        fastcgi_buffer_size 32k;
    }
    
    # Deny access to hidden files (except .well-known for SSL)
    location ~ /\.(?!well-known).* {
        deny all;
    }
    
    # Static assets caching
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }
}
