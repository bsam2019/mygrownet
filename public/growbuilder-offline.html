<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#2563eb">
    <title>Offline - GrowBuilder</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .card { background: white; border-radius: 24px; padding: 48px 32px; text-align: center; max-width: 420px; width: 100%; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25); }
        .icon { width: 72px; height: 72px; margin: 0 auto 24px; background: linear-gradient(135deg, #2563eb, #1d4ed8); border-radius: 20px; display: flex; align-items: center; justify-content: center; }
        .icon svg { width: 36px; height: 36px; fill: white; }
        h1 { font-size: 24px; color: #1e293b; margin-bottom: 12px; }
        p { color: #64748b; line-height: 1.6; margin-bottom: 8px; font-size: 15px; }
        .btn { display: inline-block; margin-top: 24px; padding: 12px 32px; background: #2563eb; color: white; border: none; border-radius: 12px; font-size: 16px; cursor: pointer; text-decoration: none; }
        .btn:hover { background: #1d4ed8; }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon"><svg viewBox="0 0 24 24"><path d="M6 6V4.5A1.5 1.5 0 017.5 3h9A1.5 1.5 0 0118 4.5V6"/><path d="M6 6v12a3 3 0 003 3h6a3 3 0 003-3V6"/><path d="M6 6H3m15 0h3"/></svg></div>
        <h1>You're offline</h1>
        <p>GrowBuilder is currently unavailable. Please check your internet connection and try again.</p>
        <button class="btn" onclick="window.location.reload()">Try Again</button>
    </div>
</body>
</html>
