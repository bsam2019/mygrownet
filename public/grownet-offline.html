<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GrowNet - Offline</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
        }
        
        .icon {
            width: 80px;
            height: 80px;
            margin: 0 auto 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .icon svg {
            width: 40px;
            height: 40px;
            color: white;
        }
        
        h1 {
            font-size: 28px;
            color: #1a202c;
            margin-bottom: 12px;
        }
        
        p {
            color: #718096;
            font-size: 16px;
            line-height: 1.6;
            margin-bottom: 30px;
        }
        
        .status {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 12px 24px;
            background: #fed7d7;
            color: #c53030;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 30px;
        }
        
        .status.online {
            background: #c6f6d5;
            color: #2f855a;
        }
        
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: currentColor;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .button {
            display: inline-block;
            padding: 14px 32px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-decoration: none;
            border-radius: 12px;
            font-weight: 600;
            font-size: 16px;
            transition: transform 0.2s, box-shadow 0.2s;
            border: none;
            cursor: pointer;
        }
        
        .button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }
        
        .button:active {
            transform: translateY(0);
        }
        
        .cached-pages {
            margin-top: 30px;
            padding-top: 30px;
            border-top: 1px solid #e2e8f0;
        }
        
        .cached-pages h2 {
            font-size: 18px;
            color: #2d3748;
            margin-bottom: 16px;
        }
        
        .page-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .page-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            background: #f7fafc;
            border-radius: 8px;
            text-decoration: none;
            color: #2d3748;
            transition: background 0.2s;
        }
        
        .page-item:hover {
            background: #edf2f7;
        }
        
        .page-name {
            font-weight: 500;
        }
        
        .page-icon {
            width: 20px;
            height: 20px;
            color: #a0aec0;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18.364 5.636a9 9 0 010 12.728m0 0l-2.829-2.829m2.829 2.829L21 21M15.536 8.464a5 5 0 010 7.072m0 0l-2.829-2.829m-4.243 2.829a4.978 4.978 0 01-1.414-2.83m-1.414 5.658a9 9 0 01-2.167-9.238m7.824 2.167a1 1 0 111.414 1.414m-1.414-1.414L3 3m8.293 8.293l1.414 1.414"></path>
            </svg>
        </div>
        
        <h1>You're Offline</h1>
        <p>GrowNet requires an internet connection to sync your network data and earnings. Some features may be limited while offline.</p>
        
        <div class="status" id="status">
            <span class="status-dot"></span>
            <span id="status-text">Offline</span>
        </div>
        
        <button class="button" onclick="retryConnection()">Retry Connection</button>
        
        <div class="cached-pages" id="cached-pages" style="display: none;">
            <h2>Available Offline Pages</h2>
            <div class="page-list" id="page-list"></div>
        </div>
    </div>
    
    <script>
        // Check online status
        function updateStatus() {
            const status = document.getElementById('status');
            const statusText = document.getElementById('status-text');
            
            if (navigator.onLine) {
                status.classList.add('online');
                statusText.textContent = 'Back Online';
                setTimeout(() => {
                    window.location.reload();
                }, 1000);
            } else {
                status.classList.remove('online');
                statusText.textContent = 'Offline';
            }
        }
        
        function retryConnection() {
            updateStatus();
            if (navigator.onLine) {
                window.location.reload();
            }
        }
        
        // Listen for online/offline events
        window.addEventListener('online', updateStatus);
        window.addEventListener('offline', updateStatus);
        
        // Initial status check
        updateStatus();
        
        // Load cached pages
        if ('serviceWorker' in navigator && navigator.serviceWorker.controller) {
            const messageChannel = new MessageChannel();
            messageChannel.port1.onmessage = (event) => {
                const pages = event.data.pages || [];
                const grownetPages = pages.filter(p => p.url.startsWith('/grownet'));
                
                if (grownetPages.length > 0) {
                    document.getElementById('cached-pages').style.display = 'block';
                    const pageList = document.getElementById('page-list');
                    pageList.innerHTML = grownetPages.map(page => `
                        <a href="${page.url}" class="page-item">
                            <span class="page-name">${page.name}</span>
                            <svg class="page-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path>
                            </svg>
                        </a>
                    `).join('');
                }
            };
            
            navigator.serviceWorker.controller.postMessage(
                { type: 'GET_CACHED_PAGES' },
                [messageChannel.port2]
            );
        }
    </script>
</body>
</html>
