<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#059669">
    <title>Offline - BizDocs</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: linear-gradient(135deg, #059669 0%, #047857 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .card { background: white; border-radius: 24px; padding: 48px 32px; text-align: center; max-width: 420px; width: 100%; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25); }
        .icon { width: 72px; height: 72px; margin: 0 auto 24px; background: linear-gradient(135deg, #059669, #047857); border-radius: 20px; display: flex; align-items: center; justify-content: center; }
        .icon svg { width: 36px; height: 36px; fill: white; }
        h1 { font-size: 24px; color: #1e293b; margin-bottom: 12px; }
        p { color: #64748b; line-height: 1.6; margin-bottom: 8px; font-size: 15px; }
        .btn { display: inline-block; margin-top: 24px; padding: 12px 32px; background: #059669; color: white; border: none; border-radius: 12px; font-size: 16px; cursor: pointer; text-decoration: none; }
        .btn:hover { background: #047857; }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon"><svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8l-6-6z"/><path d="M14 2v6h6"/><path d="M16 13H8"/><path d="M16 17H8"/><path d="M10 9H8"/></svg></div>
        <h1>You're offline</h1>
        <p>BizDocs is currently unavailable. Please check your internet connection and try again.</p>
        <button class="btn" onclick="window.location.reload()">Try Again</button>
    </div>
</body>
</html>
