<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#ea580c">
    <title>Offline - Venture Builder</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: linear-gradient(135deg, #ea580c 0%, #c2410c 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .card { background: white; border-radius: 24px; padding: 48px 32px; text-align: center; max-width: 420px; width: 100%; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25); }
        .icon { width: 72px; height: 72px; margin: 0 auto 24px; background: linear-gradient(135deg, #ea580c, #c2410c); border-radius: 20px; display: flex; align-items: center; justify-content: center; }
        .icon svg { width: 36px; height: 36px; fill: white; }
        h1 { font-size: 24px; color: #1e293b; margin-bottom: 12px; }
        p { color: #64748b; line-height: 1.6; margin-bottom: 8px; font-size: 15px; }
        .btn { display: inline-block; margin-top: 24px; padding: 12px 32px; background: #ea580c; color: white; border: none; border-radius: 12px; font-size: 16px; cursor: pointer; text-decoration: none; }
        .btn:hover { background: #c2410c; }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon"><svg viewBox="0 0 24 24"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg></div>
        <h1>You're offline</h1>
        <p>Venture Builder is currently unavailable. Please check your internet connection and try again.</p>
        <button class="btn" onclick="window.location.reload()">Try Again</button>
    </div>
</body>
</html>
